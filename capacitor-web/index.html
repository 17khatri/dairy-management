<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dairy Management</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #fafafa;
        color: #18181b;
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      section {
        max-width: 480px;
        background: #fff;
        border: 1px solid #e4e4e7;
        border-radius: 20px;
        padding: 24px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 24px;
      }

      p {
        margin: 0;
        line-height: 1.5;
        color: #52525b;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>Dairy Management</h1>
        <p>
          This Android shell is configured for online use. Set
          <code>CAPACITOR_SERVER_URL</code> to your deployed HTTPS app URL and
          resync the Android project.
        </p>
      </section>
    </main>
  </body>
</html>
